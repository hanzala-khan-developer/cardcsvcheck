<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - SerumHolic</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdf8f4;
            --primary-text: #2d1b14;
            --accent-color: #c08267;
            --white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .blog-header {
            padding: 60px 0;
            text-align: center;
        }

        .blog-header h1 {
            font-size: 3rem;
            font-weight: 700;
        }

        .blog-header h1 span {
            font-style: italic;
            color: var(--accent-color);
            font-weight: 400;
        }

        /* Blog Card Styling */
        .blog-card {
            background: var(--white);
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
            height: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .blog-card:hover {
            transform: translateY(-5px);
        }

        .blog-img-container {
            position: relative;
            padding: 15px;
        }

        .blog-card img {
            border-radius: 12px;
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .category-tag {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-color);
            z-index: 2;
        }

        .blog-content {
            padding: 0 20px 25px 20px;
        }

        .blog-date {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
            display: block;
        }

        .blog-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
            color: var(--primary-text);
            text-decoration: none;
            display: block;
        }

        .blog-title:hover {
            color: var(--accent-color);
        }

        .read-more {
            color: var(--primary-text);
            font-weight: 600;
            text-decoration: underline;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Blog Hero -->
        <header class="blog-header">
            <p style="letter-spacing: 2px; font-weight: 600; font-size: 0.8rem;">OUR REVIEWS & TIPS</p>
            <h1>Skincare <span>Insights</span></h1>
        </header>

        <!-- Blog Grid Container -->
        <!-- Yahan par Row class hai jo cards ko hold karegi -->
        <div id="blog-container" class="row g-4 mb-5">
            <!-- Data yahan JavaScript se load hoga -->
            <div class="text-center">Loading insights...</div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9rUUuChRO30Uik6iNqKz4AfuAAdB7tNtt-qAoEKefQ-3mq4ke3EM1mrXMAsI4HNPwDEA2Dx1xYlQd/pub?gid=0&single=true&output=csv';
        let allProducts = [];

        const convertDriveLink = (url) => {
            if (!url) return 'https://via.placeholder.com/400x250';
            const id = url.match(/[-\w]{25,}/);
            return id ? `https://lh3.googleusercontent.com/u/0/d/${id[0]}=w600-h400-p` : url;
        };

        async function fetchProducts() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const text = await response.text();
                allProducts = parseCSV(text);
                renderBatch(allProducts);
            } catch (e) { 
                console.error("Error fetching data", e);
                document.getElementById('blog-container').innerHTML = "Check connection.";
            }
        }

        function parseCSV(text) {
            const rows = text.split('\n');
            const items = [];
            for (let i = 1; i < rows.length; i++) {
                // Regex to handle commas inside quotes
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 5) {
                    items.push({
                        c: cols[0]?.replace(/"/g, '').trim(), // Category
                        t: cols[1]?.replace(/"/g, ''),       // Date/Title
                        d: cols[2]?.replace(/"/g, ''),       // Description
                        s: cols[3]?.replace(/"/g, ''),       // Subtitle/Heading
                        l: cols[4]?.replace(/"/g, '').trim() // Image Link
                    });
                }
            }
            return items;
        }

        function renderBatch(items) {
            const container = document.getElementById('blog-container');
            
            // col-12 (Mobile: 1 card), col-md-4 (Laptop: 3 cards)
            const html = items.map(p => `
                <div class="col-12 col-md-4">
                    <div class="blog-card">
                        <div class="blog-img-container">
                            <span class="category-tag">${p.c}</span>
                            <img src="${convertDriveLink(p.l)}" alt="${p.s}" loading="lazy">
                        </div>
                        <div class="blog-content">
                            <span class="blog-date">${p.t}</span>
                            <a href="#" class="blog-title">${p.s}</a>
                            <p class="small text-muted">${p.d}</p>
                            <a href="#" class="read-more">Read Full Article</a>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = html;
        }

        fetchProducts();
    </script>
</body>
</html>
