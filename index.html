<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme Performance Shop</title>
    <meta name="description" content="High performance catalog">

    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'">

    <style>
        :root { --bg-color: #fcf8f5; --text-gold: #b38e5d; --price-red: #c06344; --filter-border: #a36754; }
        
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: #f5f5f5; margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- FILTER SECTION --- */
        .filter-wrapper {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
        }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        .filter-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 20px 10px;
            flex: 1;
            max-width: 160px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-card.active { border: 2px solid var(--filter-border); }
        .filter-card span { display: block; }
        .filter-card .f-title { font-weight: 700; font-size: 14px; color: #333; margin-top: 5px; }
        .filter-card .f-count { font-size: 12px; color: #888; margin-top: 4px; }

        /* Mobile Grid: 2x2 per line */
        @media (max-width: 768px) {
            .filter-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .filter-card { max-width: none; padding: 15px 5px; }
        }

        /* --- YOUR ORIGINAL CARD CODE (NO CHANGES TO UI) --- */
        #card-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; width: 100%; max-width: 1200px;
            content-visibility: auto; 
            contain-intrinsic-size: 1000px; 
        }

        @media (min-width: 768px) {
            #card-container { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
            body { padding: 20px; }
        }

        .card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column;
            contain: layout style; height: 100%;
        }
        
        .image-section { background-color: var(--bg-color); aspect-ratio: 1/1; overflow: hidden; width: 100%; }
        .product-img { width: 100%; height: 100%; object-fit: cover; border: 0; }
        .content { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        
        /* Wahi original category style */
        .category { color: var(--text-gold); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        
        .title { font-size: 14px; font-weight: 600; color: #1a1a1a; margin: 8px 0; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .reviews { display: flex; align-items: center; gap: 3px; color: #666; font-size: 11px; margin-bottom: 10px; }
        .stars { color: #cc9966; }
        .card-footer { border-top: 1px solid #eee; padding-top: 8px; margin-top: auto; }
        .current { font-size: 16px; font-weight: bold; color: var(--price-red); }
        .old { color: #888; text-decoration: line-through; margin-left: 4px; font-size: 13px; }
        .discount-text { display: block; color: #1b7332; font-size: 12px; font-weight: bold; }
        .buy-btn { background: #1a120f; color: white; border: none; width: 100%; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 10px; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>
    <main id="card-container" role="main"></main>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9rUUuChRO30Uik6iNqKz4AfuAAdB7tNtt-qAoEKefQ-3mq4ke3EM1mrXMAsI4HNPwDEA2Dx1xYlQd/pub?gid=0&single=true&output=csv';
        let allProducts = [];

        const convertDriveLink = (url) => {
            if (!url) return 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
            const id = url.match(/[-\w]{25,}/);
            return id ? `https://lh3.googleusercontent.com/u/0/d/${id[0]}=w300-h300-p` : url;
        };

        async function fetchProducts() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const text = await response.text();
                allProducts = parseCSV(text);
                renderBatch(allProducts);
            } catch (e) { console.error("PLEASE CHECK YOUR INTERNET"); }
        }

        function parseCSV(text) {
            const rows = text.split('\n');
            const items = [];
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 9) {
                    items.push({
                        c: cols[0].replace(/"/g, '').trim(),
                        t: cols[1].replace(/"/g, ''),
                        d: cols[2],
                        s: cols[3],
                        l: cols[4]
                    });
                }
            }
            return items;
        }

        function filterItems(cat, el) {
            document.querySelectorAll('.filter-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const filtered = allProducts.filter(p => p.c.toLowerCase().includes(cat.toLowerCase()));
            renderBatch(filtered);
        }

        function renderBatch(items) {
            const container = document.getElementById('card-container');
            const html = items.map(p => `
                <article class="card">
                     <div class="col-md-4">
                <div class="blog-card">
                    <div class="blog-img-container">
                        <span class="category-tag">${p.c}</span>
                    <img src="${convertDriveLink(p.l)}" alt="${p.t}" class="product-img" loading="lazy" width="300" height="300">
                    </div>
                    <div class="blog-content">
                        <span class="blog-date">${p.t}</span>
                        <a href="#" class="blog-title">${p.s}</a>
                        <p class="small text-muted">${p.d}</p>
                        <a href="#" class="read-more">Read Full Article</a>
                    </div>
                </div>
            </div>
                </article>

            `).join('');
            container.innerHTML = html;
        }

        fetchProducts();
    </script>
</body>
</html>
