<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Subscription</title>
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        /* Modern & Clean CSS */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }

        .subscription-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="email"] {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border 0.3s;
        }

        input[type="email"]:focus {
            border-color: #007bff;
        }

        button {
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #status-msg {
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="subscription-card">
        <h2>Subscribe Karein!</h2>
        <p>Apni email dalein taake hum aapko thank you bol sakein.</p>
        
        <form id="sub-form" class="input-group">
            <input type="email" id="user-email" placeholder="Enter your email" required>
            <button type="submit" id="btn-submit">Subscribe Now</button>
        </form>
        
        <div id="status-msg"></div>
    </div>

    <script type="text/javascript">
        // 1. EmailJS Initialize karein
        (function() {
            emailjs.init("wWR3VAlfwpi0FLsEk"); // <-- Apni Public Key yahan dalein
        })();

        document.getElementById('sub-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const btn = document.getElementById('btn-submit');
            const status = document.getElementById('status-msg');
            
            // 2. Email fetch karna field se
            const fetchedEmail = document.getElementById('user-email').value;

            btn.innerText = 'Bhej raha hun...';
            btn.disabled = true;

            // 3. EmailJS ko data bhejna
            // Yaad rakhein Template mein {{to_email}} likhna zaroori hai
            const templateParams = {
                to_email: fetchedEmail,
                message: "Aapka shukriya subscribe karne ke liye!"
            };

            emailjs.send('service_azuyt86', 'template_h7f1d73', templateParams)
                .then(function() {
                    status.style.color = "green";
                    status.innerText = "Zabardast! Email fetch ho gayi aur " + fetchedEmail + " par msg chala gaya.";
                    btn.innerText = 'Success!';
                    document.getElementById('sub-form').reset();
                }, function(error) {
                    status.style.color = "red";
                    status.innerText = "Kuch masla hua hai. Console check karein.";
                    console.log('FAILED...', error);
                    btn.innerText = 'Try Again';
                    btn.disabled = false;
                });
        });
    </script>

</body>
</html>
