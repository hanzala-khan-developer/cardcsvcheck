<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme Performance Shop</title>
    <meta name="description" content="High performance catalog">

    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'">

    <style>
        :root { --bg-color: #fcf8f5; --text-gold: #b38e5d; --price-red: #c06344; --accent-brown: #a36754; }
        
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background-color: #f5f5f5; margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- Filter Section Styling --- */
        .filter-container {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto; /* Desktop par scrollable agar zyada hon */
            gap: 15px;
            padding: 20px 10px;
            width: 100%;
            max-width: 1200px;
            justify-content: flex-start;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .filter-container::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

        .filter-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 15px;
            min-width: 110px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
        }

        .filter-card.active { border: 2px solid var(--accent-brown); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .filter-card .f-icon { font-size: 24px; margin-bottom: 5px; display: block; }
        .filter-card .f-title { font-size: 13px; font-weight: bold; color: #333; display: block; }
        .filter-card .f-count { font-size: 11px; color: #888; }

        @media (max-width: 600px) {
            .filter-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr); /* Mobile par 1 line mein 2 */
                flex-wrap: wrap;
                overflow-x: hidden;
            }
            .filter-card { min-width: unset; padding: 10px; }
        }

        /* --- Your Original Card Styles (Unchanged) --- */
        #card-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; width: 100%; max-width: 1200px;
            content-visibility: auto; 
            contain-intrinsic-size: 1000px; 
        }

        @media (min-width: 768px) {
            #card-container { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
            body { padding: 20px; }
        }

        .card { 
            background: white; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column;
            contain: layout style; height: 100%;
        }
        
        .image-section { background-color: var(--bg-color); aspect-ratio: 1/1; overflow: hidden; width: 100%; }
        .product-img { width: 100%; height: 100%; object-fit: cover; border: 0; }
        .content { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        .category { color: var(--text-gold); font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .title { font-size: 14px; font-weight: 600; color: #1a1a1a; margin: 8px 0; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .reviews { display: flex; align-items: center; gap: 3px; color: #666; font-size: 11px; margin-bottom: 10px; }
        .stars { color: #cc9966; }
        .card-footer { border-top: 1px solid #eee; padding-top: 8px; margin-top: auto; }
        .current { font-size: 16px; font-weight: bold; color: var(--price-red); }
        .old { color: #888; text-decoration: line-through; margin-left: 4px; font-size: 12px; }
        .discount-text { display: block; color: #1b7332; font-size: 11px; font-weight: bold; }
        .buy-btn { background: #1a120f; color: white; border: none; width: 100%; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>

    <div class="filter-container" id="filter-box">
        <div class="filter-card active" onclick="filterData('All', this)">
            <span class="f-icon">✨</span>
            <span class="f-title">All Items</span>
        </div>
        <div class="filter-card" onclick="filterData('Serums', this)">
            <span class="f-icon">💧</span>
            <span class="f-title">Serums</span>
        </div>
        <div class="filter-card" onclick="filterData('Moisturizers', this)">
            <span class="f-icon">🧴</span>
            <span class="f-title">Moisturizers</span>
        </div>
        <div class="filter-card" onclick="filterData('SPF', this)">
            <span class="f-icon">☀️</span>
            <span class="f-title">SPF & Sun</span>
        </div>
    </div>

    <main id="card-container" role="main"></main>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4F4cHIXkShYEw-O-OjTysIx1PZaMO2zyPPKXQdriCoOHhGysxvIPnqDLpvyo4oA26_krxGc7LkK0j/pub?gid=0&single=true&output=csv';
        
        let allProducts = []; // Global storage for all items

        const convertDriveLink = (url) => {
            if (!url) return 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
            const id = url.match(/[-\w]{25,}/);
            return id ? `https://lh3.googleusercontent.com/u/0/d/${id[0]}=w300-h300-p` : url;
        };

        async function fetchProducts() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const result = await response.text();
                allProducts = parseCSV(result);
                renderBatch(allProducts);
            } catch (e) {
                console.error("Load failed");
            }
        }

        function parseCSV(text) {
            const rows = text.split('\n');
            const items = [];
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 9) {
                    items.push({
                        c: cols[0].replace(/"/g, '').trim(),
                        t: cols[2].replace(/"/g, ''),
                        r: cols[3],
                        p: cols[5],
                        o: cols[6],
                        d: cols[7],
                        l: cols[8]
                    });
                }
            }
            return items;
        }

        // --- Filtering Logic ---
        function filterData(category, element) {
            // UI Update: Active class change
            document.querySelectorAll('.filter-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');

            // Logic: Filter items
            if (category === 'All') {
                renderBatch(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.c.toLowerCase().includes(category.toLowerCase()));
                renderBatch(filtered);
            }
        }

        function renderBatch(items) {
            const container = document.getElementById('card-container');
            const html = items.map(p => `
                <article class="card">
                    <div class="image-section">
                        <img src="${convertDriveLink(p.l)}" alt="${p.t}" class="product-img" loading="lazy" width="300" height="300">
                    </div>
                    <div class="content">
                        <span class="category">${p.c}</span>
                        <h2 class="title">${p.t}</h2>
                        <div class="reviews">
                            <span class="stars" aria-hidden="true">★★★★★</span>
                            <span>(${p.r}) <span class="sr-only">reviews</span></span>
                        </div>
                        <div class="card-footer">
                            <div class="price-box">
                                <span class="current">$${p.p}</span>
                                <span class="old">$${p.o}</span>
                                <span class="discount-text">Save ${p.d}</span>
                            </div>
                            <button class="buy-btn" aria-label="Buy ${p.t}">
                                <i class="fas fa-shopping-cart" aria-hidden="true"></i> BUY
                            </button>
                        </div>
                    </div>
                </article>
            `).join('');
            container.innerHTML = html;
        }

        fetchProducts();
    </script>
</body>
</html>
