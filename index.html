<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Product Cards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #fcf8f5; --text-gold: #b38e5d; --price-red: #c06344; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f5f5f5; 
            margin: 0;
            padding: 10px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
        }

        /* --- Filter Styles (Scrollable on Mobile) --- */
        .filter-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 10px;
            width: 100%;
            max-width: 1200px;
            white-space: nowrap;
            scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .filter-container::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

        .filter-item {
            background: white;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            min-width: 90px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            flex: 0 0 auto;
        }

        .filter-item.active { border-color: var(--price-red); background: #fffaf9; }
        .filter-item i { font-size: 20px; margin-bottom: 5px; display: block; color: #555; }
        .filter-item span { font-size: 13px; font-weight: 600; color: #333; }

        /* --- Card Container --- */
        #card-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); /* Default for small screens */
            gap: 12px; 
            width: 100%; 
            max-width: 1200px; 
        }

        /* Desktop view adjustments */
        @media (min-width: 768px) {
            #card-container { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
            body { padding: 20px; }
        }

        /* --- Card Design --- */
        .card { 
            background: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }
        
        .image-section { 
            background-color: var(--bg-color); 
            height: 150px; /* Smaller height for 2-column mobile view */
            overflow: hidden;
        }

        @media (min-width: 768px) { .image-section { height: 220px; } }

        .product-img { width: 100%; height: 100%; object-fit: cover; }

        .content { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        .category { color: var(--text-gold); font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .title { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; line-height: 1.3; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .reviews { display: flex; align-items: center; gap: 3px; color: #888; font-size: 11px; margin-bottom: 10px; }
        .stars { color: #cc9966; }

        .card-footer { border-top: 1px solid #eee; padding-top: 8px; margin-top: auto; }
        .price-box { margin-bottom: 8px; }
        .current { font-size: 16px; font-weight: bold; color: var(--price-red); }
        .old { color: #bbb; text-decoration: line-through; margin-left: 4px; font-size: 12px; }
        .discount-text { display: block; color: #1b7332; font-size: 11px; font-weight: bold; }

        .buy-btn { 
            background: #1a120f; 
            color: white; 
            border: none; 
            width: 100%;
            padding: 8px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <div class="filter-container">
        <div class="filter-item active" onclick="filterCards('all', this)">
        <i class="fa-solid fa-droplet"></i>
            <span>All</span>
        </div>
        <div class="filter-item" onclick="filterCards('Serum', this)">
            <i class="fas fa-tint"></i>
            <span>Serums</span>
        </div>
        <div class="filter-item" onclick="filterCards('Moisturizers', this)">
            <i class="fas fa-pump-soap"></i>
            <span>Moisturizers</span>
        </div>
        <div class="filter-item" onclick="filterCards('SPF', this)">
            <i class="fas fa-sun"></i>
            <span>SPF</span>
        </div>
        <div class="filter-item" onclick="filterCards('Eye Creams', this)">
            <i class="fas fa-eye"></i>
            <span>Eye Care</span>
        </div>
    </div>

    <div id="card-container"></div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4F4cHIXkShYEw-O-OjTysIx1PZaMO2zyPPKXQdriCoOHhGysxvIPnqDLpvyo4oA26_krxGc7LkK0j/pub?gid=0&single=true&output=csv';

        let allProducts = [];

        function convertDriveLink(url) {
            if (!url) return 'https://via.placeholder.com/150';
            url = url.trim();
            const match = url.match(/[-\w]{25,}(?!.*[-\w]{25,})/);
            return match ? `https://lh3.googleusercontent.com/d/${match[0]}` : url;
        }

        async function fetchSheetData() {
            const container = document.getElementById('card-container');
            container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">Loading...</p>';

            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                allProducts = rows.map(row => {
                    const columns = row.split(',');
                    if (columns.length < 9) return null;
                    return {
                        category: columns[0].trim(),
                        sub: columns[1].trim(),
                        title: columns[2].trim(),
                        reviews: columns[3].trim(),
                        rating: columns[4].trim(),
                        current: columns[5].trim(),
                        old: columns[6].trim(),
                        discount: columns[7].trim(),
                        drive_link: columns[8].trim()
                    };
                }).filter(p => p !== null);

                renderCards(allProducts);
            } catch (error) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: red;">Error Loading Data</p>';
            }
        }

        function renderCards(products) {
            const container = document.getElementById('card-container');
            container.innerHTML = '';

            if (products.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No products found.</p>';
                return;
            }

            products.forEach(p => {
                const imgUrl = convertDriveLink(p.drive_link);
                container.innerHTML += `
                    <div class="card">
                        <div class="image-section">
                            <img src="${imgUrl}" class="product-img" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                        </div>
                        <div class="content">
                            <div class="category">${p.category}</div>
                            <div class="title">${p.title}</div>
                            <div class="reviews">
                                <span class="stars">★★★★★</span>
                                <span>(${p.reviews})</span>
                            </div>
                            <div class="card-footer">
                                <div class="price-box">
                                    <span class="current">$${p.current}</span>
                                    <span class="old">$${p.old}</span>
                                    <span class="discount-text">Save ${p.discount}</span>
                                </div>
                                <button class="buy-btn"><i class="fas fa-shopping-cart"></i> BUY</button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function filterCards(category, element) {
            document.querySelectorAll('.filter-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            if (category === 'all') {
                renderCards(allProducts);
            } else {
                const filtered = allProducts.filter(p => 
                    p.category.toLowerCase().includes(category.toLowerCase()) || 
                    p.sub.toLowerCase().includes(category.toLowerCase())
                );
                renderCards(filtered);
            }
        }

        fetchSheetData();
    </script>
</body>
</html>
