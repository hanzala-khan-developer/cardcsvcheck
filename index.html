<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extreme Performance Shop</title>
    <meta name="description" content="High performance catalog">

    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" media="print" onload="this.media='all'">

    <style>
        :root {
            --bg-color: #fdf8f4; /* Same as your home page background */
            --primary-text: #2d1b14; /* Dark brown from image_be5887.png */
            --accent-color: #c08267; /* Tan/Rose color from logo */
            --white: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Hero Section */
        .blog-header {
            padding: 60px 0;
            text-align: center;
        }

        .blog-header h1 {
            font-size: 3rem;
            font-weight: 700;
        }

        .blog-header h1 span {
            font-style: italic;
            color: var(--accent-color);
            font-weight: 400;
        }

        /* Blog Card Styling - Matching image_be58c1.jpg style */
        .blog-card {
            background: var(--white);
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease;
            height: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .blog-card:hover {
            transform: translateY(-5px);
        }

        .blog-img-container {
            position: relative;
            padding: 15px;
        }

        .blog-card img {
            border-radius: 12px;
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .category-tag {
            position: absolute;
            top: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-color);
        }

        .blog-content {
            padding: 0 20px 25px 20px;
        }

        .blog-date {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
            display: block;
        }

        .blog-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
            color: var(--primary-text);
            text-decoration: none;
            display: block;
        }

        .blog-title:hover {
            color: var(--accent-color);
        }

        .read-more {
            color: var(--primary-text);
            font-weight: 600;
            text-decoration: underline;
            font-size: 0.9rem;
        }

        /* Pagination Styling */
        .pagination .page-link {
            color: var(--primary-text);
            border: none;
            background: transparent;
            margin: 0 5px;
            border-radius: 5px;
        }

        .pagination .page-item.active .page-link {
            background-color: var(--accent-color);
            color: white;
        }

    </style>
</head>
<body>
    <main id="container" role="main"></main>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9rUUuChRO30Uik6iNqKz4AfuAAdB7tNtt-qAoEKefQ-3mq4ke3EM1mrXMAsI4HNPwDEA2Dx1xYlQd/pub?gid=0&single=true&output=csv';
        let allProducts = [];

        const convertDriveLink = (url) => {
            if (!url) return 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
            const id = url.match(/[-\w]{25,}/);
            return id ? `https://lh3.googleusercontent.com/u/0/d/${id[0]}=w300-h300-p` : url;
        };

        async function fetchProducts() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const text = await response.text();
                allProducts = parseCSV(text);
                renderBatch(allProducts);
            } catch (e) { console.error("PLEASE CHECK YOUR INTERNET"); }
        }

        function parseCSV(text) {
            const rows = text.split('\n');
            const items = [];
            for (let i = 1; i < rows.length; i++) {
                const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 9) {
                    items.push({
                        c: cols[0].replace(/"/g, '').trim(),
                        t: cols[1].replace(/"/g, ''),
                        d: cols[2],
                        s: cols[3],
                        l: cols[4]
                    });
                }
            }
            return items;
        }

        function filterItems(cat, el) {
            document.querySelectorAll('.filter-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const filtered = allProducts.filter(p => p.c.toLowerCase().includes(cat.toLowerCase()));
            renderBatch(filtered);
        }

        function renderBatch(items) {
            const container = document.getElementById('container');
            const html = items.map(p => `
                <article class="card">
                     <div class="col-md-4">
                <div class="blog-card">
                    <div class="blog-img-container">
                        <span class="category-tag">${p.c}</span>
                    <img src="${convertDriveLink(p.l)}" alt="${p.t}" class="product-img" loading="lazy" width="300" height="300">
                    </div>
                    <div class="blog-content">
                        <span class="blog-date">${p.t}</span>
                        <a href="#" class="blog-title">${p.s}</a>
                        <p class="small text-muted">${p.d}</p>
                        <a href="#" class="read-more">Read Full Article</a>
                    </div>
                </div>
            </div>
                </article>

            `).join('');
            container.innerHTML = html;
        }

        fetchProducts();
    </script>
</body>
</html>
