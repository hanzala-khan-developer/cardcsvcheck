<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Product Cards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #fcf8f5; --text-gold: #b38e5d; --price-red: #c06344; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f5f5f5; 
            margin: 0;
            padding: 20px; /* Mobile par side se space ke liye */
            display: flex; 
            justify-content: center; 
        }

        /* 1. Container Responsive Logic */
        #card-container { 
            display: grid; 
            /* Is line se cards screen width ke hisab se khud ko adjust karenge */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            width: 100%; 
            max-width: 1200px; 
        }

        /* 2. Card Layout */
        .card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            position: relative; 
            transition: transform 0.3s ease; 
            display: flex;
            flex-direction: column; /* Content niche rahe */
        }
        
        .card:hover { transform: translateY(-5px); }

        /* 3. Image Section Responsive */
        .image-section { 
            background-color: var(--bg-color); 
            height: 220px; /* Mobile ke liye thoda chota */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            padding: 10px;
        }

        .product-img { 
            max-width: 100%; 
            height: auto; 
            max-height: 180px; /* Image screen se bahar nahi jayegi */
            object-fit: contain; 
        }

        /* 4. Content Adjustments */
        .content { padding: 15px; flex-grow: 1; }
        .category { color: var(--text-gold); font-size: 11px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
        .title { font-size: 16px; font-weight: 500; color: #1a1a1a; margin-bottom: 10px; line-height: 1.4; height: 45px; overflow: hidden; }
        .reviews { display: flex; align-items: center; gap: 5px; color: #888; font-size: 13px; margin-bottom: 15px; }
        .stars { color: #cc9966; }

        /* 5. Footer (Price & Button) Responsive */
        .card-footer { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-top: 1px solid #eee; 
            padding-top: 10px; 
            margin-top: auto; 
        }

        .price-box .current { font-size: 20px; font-weight: bold; color: var(--price-red); }
        .price-box .old { color: #bbb; text-decoration: line-through; margin-left: 5px; font-size: 14px; }
        .discount-text { display: block; color: #1b7332; font-size: 12px; font-weight: bold; }

        .buy-btn { 
            background: #1a120f; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 14px;
        }

        /* Media Query for very small screens */
        @media (max-width: 350px) {
            #card-container { grid-template-columns: 1fr; }
            .price-box .current { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div id="card-container"></div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4F4cHIXkShYEw-O-OjTysIx1PZaMO2zyPPKXQdriCoOHhGysxvIPnqDLpvyo4oA26_krxGc7LkK0j/pub?gid=0&single=true&output=csv';

        function convertDriveLink(url) {
            url = url.trim();
            const match = url.match(/[-\w]{25,}(?!.*[-\w]{25,})/);
            if (match && match[0]) {
                return `https://lh3.googleusercontent.com/u/0/d/${match[0]}`;
            }
            return url;
        }

        async function fetchSheetData() {
            const container = document.getElementById('card-container');
            container.innerHTML = '<p style="text-align: center; color: #888; grid-column: 1/-1;">Loading cards...</p>';

            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                container.innerHTML = '';
                
                if (rows.length === 0 || rows[0] === '') {
                    container.innerHTML = '<p style="text-align: center; color: #888; grid-column: 1/-1;">No products found.</p>';
                    return;
                }

                rows.forEach(row => {
                    const columns = row.split(',');
                    if (columns.length < 9) return; 

                    const [category, sub, title, reviews, rating, current, old, discount, drive_link] = columns;
                    const directImageUrl = convertDriveLink(drive_link);

                    const cardHTML = `
                        <div class="card">
                            <div class="image-section">
                                <img src="${directImageUrl}" 
                                     alt="${title}" 
                                     class="product-img"
                                     onerror="this.onerror=null; this.src='https://via.placeholder.com/150?text=No+Image'">
                            </div>
                            <div class="content">
                                <div class="category">${category} · ${sub}</div>
                                <div class="title">${title}</div>
                                <div class="reviews">
                                    <span class="stars">★★★★★</span>
                                    <span>(${reviews.trim()})</span>
                                </div>
                                <div class="card-footer">
                                    <div class="price-box">
                                        <span class="current">$${current}</span>
                                        <span class="old">$${old}</span>
                                        <span class="discount-text">Save ${discount}</span>
                                    </div>
                                    <button class="buy-btn"><i class="fas fa-shopping-cart"></i> BUY</button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });
            } catch (error) {
                container.innerHTML = '<p style="text-align: center; color: red; grid-column: 1/-1;">Connection Error. Please check your link.</p>';
            }
        }
        fetchSheetData();
    </script>
</body>
</html>
